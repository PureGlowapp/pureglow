<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureGlow Smile</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.logo span {
    color: #a855f7;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 60px 20px;
    flex-wrap: wrap;
}

.hero-text {
    max-width: 400px;
}

.hero-text h1 {
    font-size: 40px;
}

.hero-text span {
    color: #a855f7;
}

.btn {
    margin-top: 20px;
    padding: 12px 30px;
    background: linear-gradient(45deg,#a855f7,#ec4899);
    border: none;
    border-radius: 30px;
    color: white;
}

/* IMAGE */
.hero img {
    width: 280px;
}

/* SECTION */
.section {
    padding: 50px 20px;
    text-align: center;
}

/* AVANT APRES */
.before-after img {
    width: 300px;
    border-radius: 10px;
}

/* INGREDIENTS */
.ingredients {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.ingredients img {
    width: 100px;
    border-radius: 50%;
}

/* CTA */
.cta {
    background: #111;
    padding: 40px;
    text-align: center;
}

.price {
    color: #a855f7;
    font-size: 28px;
}
</style>
</head>

<body>

<nav>
    <div class="logo">Pure<span>Glow</span></div>
    <button class="btn">Commander</button>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <h1>Poudre blanchissante <span>Violette 5D</span></h1>
        <p>Un sourire plus blanc instantanément ✨</p>
        <button class="btn">Acheter maintenant</button>
    </div>

    <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5">
</section>

<!-- RESULTAT -->
<section class="section">
    <h2>Résultats visibles</h2>
    <div class="before-after">
        <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
    </div>
</section>

<!-- INGREDIENTS -->
<section class="section">
    <h2>Ingrédients naturels</h2>
    <div class="ingredients">
        <img src="https://images.unsplash.com/photo-1587049352846-4a222e784d38">
        <img src="https://images.unsplash.com/photo-1582719478181-2c72b5a4c58c">
        <img src="https://images.unsplash.com/photo-1615485737651-cb9d6e1fbe7b">
    </div>
</section>

<!-- CTA -->
<section class="cta">
    <h2>Prêt à avoir un sourire parfait ?</h2>
    <p class="price">19,99€</p>
    <button class="btn">Commander maintenant</button>
</section>

</body>
</html>
