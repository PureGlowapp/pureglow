<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureGlow Smile</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
  text-align:center;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hero img {
  width:220px;
  margin-bottom:20px;
}

h1 {
  font-size:40px;
}

.btn {
  margin-top:20px;
  padding:15px 30px;
  background:#a855f7;
  border:none;
  color:white;
  border-radius:30px;
  font-size:16px;
}

/* SECTIONS */
.section {
  padding:80px 20px;
}

img {
  width:90%;
  max-width:400px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(168,85,247,0.4);
  transition:0.3s;
}

img:hover {
  transform:scale(1.05);
}

/* CARD */
.card {
  background:#111;
  padding:30px;
  border-radius:20px;
  margin-top:20px;
}

/* FOOTER */
footer {
  padding:40px;
  color:#777;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <img src="71B6A2D9-51BD-41D2-BFFA-C5D37EDBE75C.png">
  <h1>Poudre Blanchissante Violette</h1>
  <p>Dents plus blanches en 5 jours ✨</p>
  <button class="btn">Commander maintenant</button>
</section>

<!-- AVANT APRES -->
<section class="section">
  <h2>Résultats visibles</h2>
  <img src="0E1FBE05-0C80-4130-A4D4-50D92C8838F3.png">
</section>

<!-- INGREDIENTS -->
<section class="section">
  <h2>Ingrédients naturels</h2>
  <img src="2A01B496-6E22-4BD7-935F-031ACE019604.png">
</section>

<!-- UTILISATION -->
<section class="section">
  <h2>Comment ça marche</h2>
  <img src="usage.png">
</section>

<!-- PRODUIT -->
<section class="section">
  <div class="card">
    <h2>PureGlow Smile</h2>
    <p>
    ✔ Blanchit les dents<br>
    ✔ Élimine les taches<br>
    ✔ Résultat rapide<br>
    ✔ Facile à utiliser
    </p>
    <h1>19,99€</h1>
    <button class="btn">Acheter maintenant</button>
  </div>
</section>

<footer>
© 2026 PureGlow - Tous droits réservés
</footer>

</body>
</html>
