<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureGlow Smile</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.glow {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 60px #a855f7, 0 0 120px #a855f7;
    margin-bottom: 20px;
}

/* TEXT */
h1 {
    font-size: 40px;
}

p {
    color: #ccc;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px 30px;
    background: #a855f7;
    border: none;
    border-radius: 30px;
    color: white;
    font-size: 16px;
}

/* PRODUCT */
.product {
    padding: 60px 20px;
}

.card {
    background: #111;
    padding: 30px;
    border-radius: 20px;
    max-width: 300px;
    margin: auto;
}

.card img {
    width: 100%;
    border-radius: 15px;
}

.price {
    color: #a855f7;
    font-size: 24px;
}

/* SECTION */
.section {
    padding: 60px 20px;
}

/* FOOTER */
footer {
    padding: 20px;
    background: #111;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="glow">✨</div>
    <h1>PureGlow Smile</h1>
    <p>Un sourire plus éclatant instantanément</p>
    <button onclick="scrollTo({top:800,behavior:'smooth'})">
        Découvrir
    </button>
</section>

<!-- PRODUIT -->
<section class="product">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5">
        <h2>Poudre Blanchissante Violette</h2>
        <p>Corrige instantanément les tons jaunes pour un sourire plus lumineux.</p>
        <p class="price">9,99€</p>
        <button>Acheter</button>
    </div>
</section>

<!-- AVANTAGES -->
<section class="section">
    <h2>Pourquoi ça marche ?</h2>
    <p>✔ Neutralise le jaune<br>
       ✔ Effet immédiat<br>
       ✔ Facile à utiliser<br>
       ✔ Portable</p>
</section>

<!-- CTA -->
<section class="section">
    <h2>Essaye maintenant</h2>
    <button>Acheter maintenant</button>
</section>

<footer>
    <p>© 2026 PureGlow</p>
</footer>

</body>
</html>
