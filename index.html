<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureGlow</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(0,0,0,0.8);
    position: sticky;
    top: 0;
}

header h1 {
    color: #f48fb1;
}

nav a {
    margin: 0 15px;
    color: white;
    text-decoration: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h2 {
    font-size: 40px;
}

.hero button {
    margin-top: 20px;
    padding: 12px 30px;
    background: #f48fb1;
    border: none;
    border-radius: 25px;
    color: white;
    font-size: 16px;
}

/* PRODUCTS */
.products {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 40px;
    padding: 50px;
}

.card {
    position: relative;
    width: 280px;
    height: 400px;
    background: #111;
    border-radius: 20px;
    overflow: hidden;
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px);
}

.circle {
    position: absolute;
    width: 200px;
    height: 200px;
    background: #f48fb1;
    border-radius: 50%;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 50px #f48fb1, 0 0 100px #f48fb1;
}

.card img {
    position: absolute;
    width: 180px;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
}

.content {
    position: absolute;
    bottom: 20px;
    text-align: center;
    width: 100%;
}

.content h3 {
    margin: 0;
}

.content p {
    font-size: 14px;
}

.content a {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 20px;
    background: #f48fb1;
    border-radius: 20px;
    color: white;
    text-decoration: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #111;
}
</style>
</head>

<body>

<header>
    <h1>PureGlow</h1>
    <nav>
        <a href="#">Accueil</a>
        <a href="#">Produits</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Révèle ton glow naturel ✨</h2>
    <p>Des brosses visage pour une peau parfaite</p>
    <button>Acheter maintenant</button>
</section>

<section class="products">

    <div class="card">
        <div class="circle"></div>
        <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
        <div class="content">
            <h3>PureGlow Pro</h3>
            <p>Nettoyage profond</p>
            <a href="#">29,99€</a>
        </div>
    </div>

    <div class="card">
        <div class="circle"></div>
        <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba1">
        <div class="content">
            <h3>PureGlow Mini</h3>
            <p>Compacte & pratique</p>
            <a href="#">19,99€</a>
        </div>
    </div>

</section>

<footer>
    <p>© 2026 PureGlow</p>
</footer>

</body>
</html>
