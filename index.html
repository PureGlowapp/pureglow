<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureGlow</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* INTRO LOGO */
.intro {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
}

.circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    box-shadow:
        0 0 40px #f48fb1,
        0 0 80px #f48fb1,
        0 0 120px #f48fb1;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h2 {
    font-size: 32px;
}

/* PRODUCTS */
.products {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    padding: 50px;
}

.card {
    background: #111;
    border-radius: 20px;
    padding: 20px;
    width: 260px;
    text-align: center;
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    border-radius: 15px;
}

.price {
    color: #f48fb1;
    font-size: 22px;
}

button {
    background: #f48fb1;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- INTRO -->
<section class="intro">
    <div class="circle">
        PureGlow
    </div>
</section>

<!-- HERO -->
<section class="hero">
    <h2>Révèle ton glow naturel ✨</h2>
    <p>Une peau propre et lumineuse chaque jour</p>
</section>

<!-- PRODUITS -->
<section class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
        <h3>PureGlow Pro</h3>
        <p>Nettoyage profond</p>
        <p class="price">29,99€</p>
        <button>Acheter</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba1">
        <h3>PureGlow Mini</h3>
        <p>Compacte & pratique</p>
        <p class="price">19,99€</p>
        <button>Acheter</button>
    </div>

</section>

</body>
</html>
